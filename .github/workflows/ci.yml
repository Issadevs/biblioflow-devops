name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Qualité et tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v7
      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Installer les dépendances
        run: npm ci
      - name: Vérifier le formatage
        run: npm run format:check
      - name: Analyser le code
        run: npm run lint
      - name: Tester avec couverture
        run: npm run test:coverage
      - name: Publier le rapport de couverture
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  containers:
    name: Docker et intégration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v7
      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Valider la composition
        run: docker compose config --quiet
      - name: Construire les images
        run: docker compose build
      - name: Démarrer les services
        run: WEB_PORT=18080 docker compose up -d --wait
      - name: Tester le parcours complet
        run: BASE_URL=http://localhost:18080 node scripts/integration-test.mjs
      - name: Arrêter les services
        if: always()
        run: WEB_PORT=18080 docker compose down -v
